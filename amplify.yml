# Amplify Hosting — build from repo root (no cd between phases).
# Env: App settings → VITE_TRANSLATE_API_URL, VITE_IMAGE_TO_TEXT_API_URL
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix webapp ci
    build:
      commands:
        - npm --prefix webapp run build
  artifacts:
    baseDirectory: webapp/dist
    files:
      - "**/*"
  cache:
    paths:
      - webapp/node_modules/**/*
