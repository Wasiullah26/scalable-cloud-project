# AWS Amplify Hosting: connect this repo, leave default branch, Amplify picks this file up.
# Set VITE_TRANSLATE_API_URL and VITE_IMAGE_TO_TEXT_API_URL under App settings → Environment variables
# (Vite bakes them in at build time — redeploy after changing them.)
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd webapp && npm ci
    build:
      commands:
        - cd webapp && npm run build
  artifacts:
    baseDirectory: webapp/dist
    files:
      - "**/*"
  cache:
    paths:
      - webapp/node_modules/**/*
