# Deploy FastAPI backend to Lambda + API Gateway (same as: cd backend && python deploy.py)
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
# Optional (same as backend/.env):
#   AWS_SESSION_TOKEN       — if using temporary credentials (e.g. Learner Lab)
#   AWS_REGION              — optional; default us-east-1 (secret or Variables tab)
#   JWT_SECRET              — passed to Lambda for auth
#   LAMBDA_ROLE_ARN         — if you cannot create IAM roles in CI
#
# Without these secrets the job will fail at the AWS login step — that is expected until you add them.

name: Deploy backend (Lambda)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-lambda-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Omit AWS_SESSION_TOKEN in repo secrets if you use long-lived IAM user keys.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (for deploy script)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Deploy Lambda + API Gateway
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          API_NAME: ${{ secrets.API_NAME }}
          TRANSLATIONS_TABLE: ${{ secrets.TRANSLATIONS_TABLE }}
          USERS_TABLE: ${{ secrets.USERS_TABLE }}
        run: python deploy.py
