# Deploy FastAPI backend to Lambda + HTTP API Gateway (same as: cd backend && python deploy.py)
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Optional:
#   AWS_SESSION_TOKEN       — temporary/STS only; delete secret if you use long-lived IAM keys only
#   AWS_REGION              — use Repository Variables (recommended), e.g. us-east-1 — NOT a display name like "Ireland".
#                             Must match your API URL (…execute-api.us-east-1…). Wrong/typo region → DNS error on sts.<region>.amazonaws.com
#   JWT_SECRET              — Lambda auth (recommended)
#   LAMBDA_ROLE_ARN         — only if deploy cannot create/use the default role
# Repository variable SKIP_DYNAMODB_ENSURE — default 1 via workflow (Voclabs often Deny DynamoDB from GitHub IPs).
#   Set to 0 if CI must create tables (DescribeTable). First-time: run `cd backend && python deploy.py` locally once.
# Table/API names use deploy.py defaults (translations, users, text-to-languages-api, …).

name: Deploy backend (Lambda)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-lambda-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Multiline GITHUB_ENV is reliable for special characters in secrets.
      # Normalize region: invalid sts.<region>.amazonaws.com → DNS "Name or service not known" (not expired keys).
      - name: Configure AWS credentials for boto3
        env:
          AWS_REGION_RAW: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -e
          R="${AWS_REGION_RAW}"
          R=$(echo "$R" | xargs | tr '[:upper:]' '[:lower:]')
          if [ -z "$R" ] || ! echo "$R" | grep -qE '^[a-z]{2}-[a-z0-9-]+-[0-9]+$'; then
            echo "::warning::AWS_REGION is empty or not a valid code (e.g. us-east-1). Check Variables/secrets — not a country name. Defaulting to us-east-1."
            R=us-east-1
          fi
          {
            echo "AWS_ACCESS_KEY_ID<<__DELIM__"
            echo "${{ secrets.AWS_ACCESS_KEY_ID }}"
            echo "__DELIM__"
            echo "AWS_SECRET_ACCESS_KEY<<__DELIM__"
            echo "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            echo "__DELIM__"
            echo "AWS_REGION=${R}"
            echo "AWS_DEFAULT_REGION=${R}"
          } >> "$GITHUB_ENV"
          ST="${{ secrets.AWS_SESSION_TOKEN }}"
          if [ -n "$ST" ]; then
            {
              echo "AWS_SESSION_TOKEN<<__DELIM__"
              echo "$ST"
              echo "__DELIM__"
            } >> "$GITHUB_ENV"
          fi
          echo "Resolved AWS_REGION for boto3: ${R}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (for deploy script)
        working-directory: backend
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      # Same SDK as deploy.py — avoids relying on a preinstalled `aws` CLI on the runner.
      - name: Verify AWS credentials
        working-directory: backend
        run: |
          echo "Calling STS (AWS_REGION=${AWS_REGION})"
          python -c "import boto3, os; r=os.environ.get('AWS_REGION','us-east-1'); print(boto3.client('sts', region_name=r).get_caller_identity())"

      # Same commit as checkout — proves CI deploys the code you see on GitHub (not stale local-only edits).
      - name: Deploy fingerprint
        run: |
          echo "commit=$(git rev-parse HEAD)"
          sha256sum backend/app.py backend/deploy.py

      - name: Deploy Lambda + API Gateway
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          # Voclabs: explicit deny on dynamodb:DescribeTable from GitHub — skip table checks if tables already exist.
          SKIP_DYNAMODB_ENSURE: ${{ vars.SKIP_DYNAMODB_ENSURE || '1' }}
        run: |
          echo "AWS_REGION for this deploy (must match your API URL region, e.g. us-east-1 for ...execute-api.us-east-1...): ${AWS_REGION}"
          python -u deploy.py
