# Deploy FastAPI backend to Lambda + API Gateway (same as: cd backend && python deploy.py)
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
# Optional (same as backend/.env):
#   AWS_SESSION_TOKEN       — only for temporary/STS credentials; if you use long-lived IAM keys,
#                             delete this secret entirely (do not leave an empty secret).
#   AWS_REGION              — optional; default us-east-1 (secret or Variables tab)
#   JWT_SECRET              — passed to Lambda for auth
#   LAMBDA_ROLE_ARN         — if you cannot create IAM roles in CI
#
# Without AWS secrets the job will fail — that is expected until you add them.

name: Deploy backend (Lambda)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-lambda-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # boto3 reads AWS_* from the environment. We only set AWS_SESSION_TOKEN when the secret
      # is non-empty — passing an empty session token to the AWS CLI/SDK often fails validation.
      - name: Configure AWS credentials for boto3
        env:
          AWS_REGION_VALUE: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          echo "AWS_REGION=${AWS_REGION_VALUE}" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=${AWS_REGION_VALUE}" >> "$GITHUB_ENV"
          ST="${{ secrets.AWS_SESSION_TOKEN }}"
          if [ -n "$ST" ]; then echo "AWS_SESSION_TOKEN=$ST" >> "$GITHUB_ENV"; fi

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (for deploy script)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Deploy Lambda + API Gateway
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          API_NAME: ${{ secrets.API_NAME }}
          TRANSLATIONS_TABLE: ${{ secrets.TRANSLATIONS_TABLE }}
          USERS_TABLE: ${{ secrets.USERS_TABLE }}
        run: python -u deploy.py
