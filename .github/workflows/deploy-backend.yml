# Deploy FastAPI backend to Lambda + HTTP API Gateway (same as: cd backend && python deploy.py)
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Optional:
#   AWS_SESSION_TOKEN       — temporary/STS only; delete secret if you use long-lived IAM keys only
#   AWS_REGION              — default us-east-1 (secret or Variables)
#   JWT_SECRET              — Lambda auth (recommended)
#   LAMBDA_ROLE_ARN         — only if deploy cannot create/use the default role
#   CORS_ORIGINS            — optional, comma-separated (e.g. https://main.d25pgvgew92bxj.amplifyapp.com,http://localhost:5173)
#                             omit for allow-all * in Lambda
# Table/API names use deploy.py defaults (translations, users, text-to-languages-api, …).

name: Deploy backend (Lambda)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-lambda-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Multiline GITHUB_ENV is reliable for special characters in secrets.
      - name: Configure AWS credentials for boto3
        env:
          AWS_REGION_VALUE: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
        run: |
          {
            echo "AWS_ACCESS_KEY_ID<<__DELIM__"
            echo "${{ secrets.AWS_ACCESS_KEY_ID }}"
            echo "__DELIM__"
            echo "AWS_SECRET_ACCESS_KEY<<__DELIM__"
            echo "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            echo "__DELIM__"
            echo "AWS_REGION=${AWS_REGION_VALUE}"
            echo "AWS_DEFAULT_REGION=${AWS_REGION_VALUE}"
          } >> "$GITHUB_ENV"
          ST="${{ secrets.AWS_SESSION_TOKEN }}"
          if [ -n "$ST" ]; then
            {
              echo "AWS_SESSION_TOKEN<<__DELIM__"
              echo "$ST"
              echo "__DELIM__"
            } >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (for deploy script)
        working-directory: backend
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      # Same SDK as deploy.py — avoids relying on a preinstalled `aws` CLI on the runner.
      - name: Verify AWS credentials
        working-directory: backend
        run: python -c "import boto3; print(boto3.client('sts').get_caller_identity())"

      # Same commit as checkout — proves CI deploys the code you see on GitHub (not stale local-only edits).
      - name: Deploy fingerprint
        run: |
          echo "commit=$(git rev-parse HEAD)"
          sha256sum backend/app.py backend/deploy.py

      - name: Deploy Lambda + API Gateway
        working-directory: backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: python -u deploy.py
